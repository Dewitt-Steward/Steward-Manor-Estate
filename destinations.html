<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Datamaps World Choropleth</title>
  <style>
    :root {
      --page-bg: #f4f7fb;
      --panel-bg: #ffffff;
      --ink: #16324f;
      --muted: #5b7083;
      --border: #d8e2ec;
      --accent-0: #eef3f8;
      --accent-1: #d7e6f6;
      --accent-2: #2f6fae;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(111, 164, 216, 0.18), transparent 28%),
        linear-gradient(180deg, #f8fbfe 0%, var(--page-bg) 100%);
    }

    .page {
      width: calc(100% - 16px);
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .hero,
    .map-panel,
    .categories-panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(22, 50, 79, 0.08);
    }

    .hero {
      padding: 24px 28px;
      margin-bottom: 20px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }

    .hero-copy-block {
      min-width: min(100%, 520px);
      flex: 1 1 520px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1;
    }

    .hero p {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .hero .filter-controls {
      width: min(1100px, 100%);
      margin: 18px auto 0;
    }

    .hero .categories-panel {
      margin: 8px auto 0;
      padding: 0;
      width: min(1100px, 100%);
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .hero-actions {
      display: grid;
      gap: 10px;
      justify-items: end;
      min-width: 260px;
    }

    .hero-actions[hidden] {
      display: none !important;
    }

    .refresh-button {
      border: 1px solid var(--accent-2);
      border-radius: 999px;
      background: var(--accent-2);
      color: #ffffff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 11px 16px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(47, 111, 174, 0.18);
    }

    .refresh-button[disabled] {
      cursor: wait;
      opacity: 0.7;
    }

    .refresh-status {
      margin: 0;
      max-width: 320px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .refresh-status[data-state="success"] {
      color: #196944;
    }

    .refresh-status[data-state="error"] {
      color: #9b2d30;
    }

    .layout {
      display: block;
    }

    .map-panel {
      padding: 18px 18px 12px;
    }

    .map-main,
    .map-main.has-itinerary {
      display: block;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }

    .map-head .panel-title {
      margin-bottom: 0;
    }

    #map {
      position: relative;
      width: 100%;
      height: min(72vh, 860px);
      min-height: 560px;
      border-radius: 16px;
      background: #eef3f8;
      overflow: hidden;
    }

    #map.is-pannable {
      cursor: grab;
    }

    #map.is-pannable.is-dragging {
      cursor: grabbing;
    }

    .map-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 25;
      display: flex;
      gap: 10px;
    }

    .map-control-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(22, 50, 79, 0.12);
    }

    .map-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 20;
      width: min(320px, calc(100% - 32px));
      max-height: calc(100% - 32px);
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 14px 32px rgba(22, 50, 79, 0.12);
      backdrop-filter: blur(8px);
    }

    .map-overlay[hidden] {
      display: none;
    }

    .map-overlay-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 800;
    }

    .map-overlay-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: var(--ink);
    }

    .categories-panel {
      margin-top: 0;
      padding: 18px;
      margin-bottom: 20px;
    }

    .map-panel .categories-panel {
      margin-top: 0;
      margin-bottom: 0;
    }

    .legend {
      margin: 0 0 18px;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .legend li,
    .top-states li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .top-states {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .top-states li {
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fbfdff;
    }

    .top-states strong {
      font-size: 15px;
    }

    .top-states span {
      color: var(--muted);
      font-weight: 600;
    }

    .filter-controls {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .filter-control {
      display: grid;
      gap: 6px;
    }

    .filter-control label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .filter-select {
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fbfdff;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      padding: 10px 12px;
      width: 100%;
    }

    .date-filter-control {
      position: relative;
    }

    .date-filter-trigger {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fbfdff;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      cursor: pointer;
    }

    .date-filter-trigger.is-open {
      border-color: var(--accent-2);
      background: var(--accent-0);
      color: var(--ink);
    }

    .date-filter-icon {
      flex: 0 0 auto;
      font-size: 14px;
      line-height: 1;
    }

    .date-filter-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 40;
      width: clamp(720px, 72vw, 1080px);
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fbfdff;
      box-shadow: 0 16px 40px rgba(22, 50, 79, 0.12);
    }

    .date-filter-panel[hidden] {
      display: none;
    }

    .date-filter-tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .date-filter-tab-bar {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 0;
      padding: 6px;
      border-radius: 0;
      background: #e9eef6;
    }

    .date-filter-tab {
      border: 1px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--accent-2);
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      padding: 12px 24px;
      cursor: pointer;
    }

    .date-filter-tab.is-active {
      border-color: var(--accent-2);
      background: #ffffff;
      color: var(--accent-2);
    }

    .date-filter-pane[hidden] {
      display: none;
    }

    .date-filter-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .duration-filter-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .duration-filter-option {
      border: 1px solid var(--border);
      border-radius: 0;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
    }

    .duration-filter-option.is-active {
      border-color: var(--accent-2);
      background: var(--accent-0);
      color: var(--ink);
    }

    .date-filter-years {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .date-range-calendar {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) minmax(0, 1fr) 44px;
      gap: 16px;
      align-items: start;
    }

    .date-range-nav {
      border: 0;
      background: transparent;
      color: var(--accent-2);
      font: inherit;
      font-size: 34px;
      line-height: 1;
      padding: 48px 0 0;
      cursor: pointer;
    }

    .date-range-month {
      display: grid;
      gap: 10px;
    }

    .date-range-month-title {
      margin: 0;
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .date-range-weekdays,
    .date-range-days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .date-range-weekdays {
      gap: 8px;
    }

    .date-range-days {
      gap: 0;
    }

    .date-range-weekdays span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .date-range-day {
      min-height: 42px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      cursor: default;
    }

    .date-range-day.is-available {
      color: var(--accent-2);
      cursor: pointer;
    }

    .date-range-day.is-selected {
      background: var(--accent-2);
      color: #ffffff;
    }

    .date-range-day.range-start,
    .date-range-day.range-end,
    .date-range-day.range-single {
      background: var(--accent-2);
      color: #ffffff;
    }

    .date-range-day.range-start {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .date-range-day.range-end {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    .date-range-day.range-single {
      border-radius: 0;
    }

    .date-range-day.is-empty {
      visibility: hidden;
    }

    .selection-panel {
      margin-top: 0;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfdff;
    }

    #itineraryBrowser {
      position: relative;
      max-height: min(72vh, 860px);
      overflow: auto;
      overflow-x: hidden;
      padding: 0;
    }

    .search-feedback {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(251, 253, 255, 0.84);
      backdrop-filter: blur(4px);
    }

    .search-feedback[hidden] {
      display: none;
    }

    .search-feedback-card {
      display: grid;
      justify-items: center;
      gap: 10px;
      min-width: 180px;
      padding: 18px 22px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 14px 32px rgba(22, 50, 79, 0.12);
    }

    .search-feedback-spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(47, 111, 174, 0.18);
      border-top-color: var(--accent-2);
      border-radius: 50%;
      animation: search-spin 0.9s linear infinite;
    }

    .search-feedback-text {
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    @keyframes search-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .itinerary-sticky-header {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 0 12px;
      padding: 18px 18px 14px;
      background: #fbfdff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 20px rgba(22, 50, 79, 0.04);
    }

    .browser-toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .browser-toolbar .browser-category-control {
      margin: 0;
    }

    .browser-toolbar .filter-controls {
      margin: 0;
      width: 100%;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
    }

    .selection-panel[hidden] {
      display: none;
    }

    .selection-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .selection-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .selection-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .reset-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fbfdff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
    }

    .reset-button[hidden] {
      display: none;
    }

    .itinerary-filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .itinerary-filter-button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
    }

    .itinerary-filter-button.is-active {
      border-color: var(--accent-2);
      background: var(--accent-0);
      color: var(--ink);
    }

    .itinerary-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .departure-port-panel {
      margin: 8px 0 14px;
    }

    .departure-port-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .departure-port-button {
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fbfdff;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
    }

    .departure-port-button.is-active {
      border-color: var(--accent-2);
      background: var(--accent-0);
      color: var(--ink);
    }

    .year-sections {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
      align-items: start;
    }

    .year-section {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fbfdff;
    }

    .year-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .month-button {
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 10px 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .month-button[disabled] {
      cursor: default;
      color: var(--muted);
      background: #f5f7fa;
    }

    .month-button.is-active {
      background: var(--ink);
      color: #ffffff;
      border-color: var(--ink);
    }

    .itinerary-list {
      margin: 0;
      padding: 0 18px 18px;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .itinerary-list li {
      position: relative;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fbfdff;
      display: grid;
      gap: 4px;
      font-size: 14px;
    }

    .itinerary-list strong {
      display: block;
      padding-right: 360px;
      font-size: 15px;
    }

    .itinerary-summary {
      margin: 2px 0 10px;
      padding-right: 360px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
    }

    .itinerary-pill-stack {
      position: absolute;
      top: 12px;
      right: 12px;
      display: grid;
      justify-items: end;
      gap: 6px;
      flex-shrink: 0;
    }

    .itinerary-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 0;
      background: var(--accent-2);
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      width: fit-content;
    }

    .itinerary-pill.is-final-payment {
      background: #f4df72;
      color: #000000;
    }

    .itinerary-pill.is-final-payment.is-due-now {
      color: #b42318;
    }

    .itinerary-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .itinerary-footer {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 12px;
      margin-top: 8px;
    }

    .itinerary-route {
      text-align: center;
      justify-self: center;
      align-self: start;
    }

    .itinerary-footer-spacer {
      min-width: 0;
    }

    .itinerary-offers-link {
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: #1d7a34;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      text-align: left;
      white-space: nowrap;
      justify-self: start;
      align-self: start;
      cursor: pointer;
    }

    .itinerary-offers-link::after {
      content: "\25BE";
      font-size: 11px;
      line-height: 1;
    }

    .itinerary-offers-link[aria-expanded="true"]::after {
      content: "\25B4";
    }

    .itinerary-offers-link:hover {
      text-decoration: underline;
    }

    .itinerary-offer-details {
      margin-top: 6px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 4px;
    }

    .itinerary-offer-details[hidden] {
      display: none;
    }

    .itinerary-offer-title {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .itinerary-offer-item {
      display: grid;
      gap: 2px;
    }

    .itinerary-offer-item + .itinerary-offer-item {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .itinerary-offer-status {
      font-size: 13px;
      font-weight: 800;
    }

    .itinerary-offer-status.is-eligible {
      color: #1d7a34;
    }

    .itinerary-offer-status.is-not-eligible {
      color: #b3261e;
    }

    .destination-panel {
      margin-top: 20px;
      padding: 24px;
    }

    .destination-panel-head {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .destination-panel-head h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
    }

    .destination-panel-head p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .destination-filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .destination-status {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .destination-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .destination-card {
      border: 1px solid var(--border);
      border-radius: 0;
      background: #fbfdff;
      overflow: hidden;
      cursor: default;
      text-align: left;
      padding: 0;
      box-shadow: 0 10px 24px rgba(22, 50, 79, 0.06);
    }

    .destination-card-image {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #dce6f0;
      border-radius: 0;
      overflow: hidden;
    }

    .destination-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .destination-card-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(22, 50, 79, 0.08) 0%, rgba(22, 50, 79, 0.26) 100%);
      pointer-events: none;
    }

    .destination-card-explore {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      opacity: 0;
      visibility: hidden;
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px 18px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(22, 50, 79, 0.16);
      transition: opacity 0.18s ease, visibility 0.18s ease;
    }

    .destination-card-image:hover .destination-card-explore,
    .destination-card-image:focus-within .destination-card-explore {
      opacity: 1;
      visibility: visible;
    }

    @media (hover: none) {
      .destination-card-explore {
        opacity: 1;
        visibility: visible;
      }
    }

    .destination-card-copy {
      display: grid;
      gap: 4px;
      padding: 10px 12px 12px;
    }

    .destination-card-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--ink);
    }

    .destination-card-country {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .destination-card-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .destination-empty {
      grid-column: 1 / -1;
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fbfdff;
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .destination-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(9, 19, 31, 0.82);
      backdrop-filter: blur(8px);
    }

    .destination-modal.is-open {
      display: flex;
    }

    .destination-modal-panel {
      width: min(1100px, 100%);
      max-height: 90vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(22, 50, 79, 0.26);
    }

    .destination-modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--border);
    }

    .destination-modal-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
    }

    .destination-modal-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .destination-modal-close {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fbfdff;
      color: var(--ink);
      width: 40px;
      height: 40px;
      font-size: 24px;
      cursor: pointer;
    }

    .destination-modal-hero {
      padding: 0 22px;
    }

    .destination-modal-hero[hidden] {
      display: none;
    }

    .destination-modal-hero-image {
      width: 100%;
      max-height: 280px;
      border-radius: 16px;
      overflow: hidden;
      background: #dce6f0;
    }

    .destination-modal-hero-image img {
      width: 100%;
      height: 100%;
      max-height: 280px;
      object-fit: cover;
    }

    .destination-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 22px 0;
    }

    .destination-tab {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fbfdff;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .destination-tab.is-active {
      border-color: var(--accent-2);
      background: var(--accent-2);
      color: #ffffff;
    }

    .destination-modal-body {
      overflow: auto;
      padding: 20px 22px 22px;
      display: grid;
      gap: 16px;
    }

    .destination-block {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfdff;
      padding: 18px;
    }

    .destination-block h3,
    .destination-block h4 {
      margin: 0 0 12px;
    }

    .destination-rich {
      line-height: 1.7;
      color: var(--ink);
    }

    .destination-rich p:first-child,
    .destination-rich ul:first-child,
    .destination-rich ol:first-child {
      margin-top: 0;
    }

    .destination-rich p:last-child,
    .destination-rich ul:last-child,
    .destination-rich ol:last-child {
      margin-bottom: 0;
    }

    .destination-section-item {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .destination-section-item + .destination-section-item {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .destination-section-image {
      border-radius: 14px;
      overflow: hidden;
      background: #dce6f0;
    }

    .destination-section-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #browserDestinationsPane {
      padding: 18px;
    }

    #browserDestinationsPane[hidden] {
      display: none;
    }

    #browserDestinationsPane .destination-panel-head h2 {
      font-size: 22px;
    }

    .datamaps-hoverover {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(22, 50, 79, 0.12);
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      box-shadow: 0 10px 30px rgba(22, 50, 79, 0.15);
      font-family: inherit;
    }

    .datamaps-hoverover strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    @media (max-width: 1280px) {
      .browser-toolbar {
        grid-template-columns: 1fr;
      }

      .year-sections {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

        width: min(100vw - 40px, 920px);
      }

      .date-filter-years {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .date-range-calendar {
        grid-template-columns: 32px minmax(0, 1fr) minmax(0, 1fr) 32px;
      }
    }

    @media (max-width: 980px) {
    }

    @media (max-width: 720px) {
      .page {

      .hero,

      }

      .hero,

      .hero-actions {

      }

      .filter-controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .destination-filters,

        grid-template-columns: repeat(2, minmax(0, 1fr));

        width: 100%;

    function normalizeStopName(stop) {
      return String(stop || "")
        .replace(/^Overnight\s+/i, "")
        .replace(/^\d+\s+days?\s+at\s+/i, "")
        .trim();
    }

    function getDestinationCode(stop) {
      const normalized = normalizeStopName(stop);

      if (!normalized || normalized === "Fun Day at Sea") {
        return null;
      }
      if (normalized === "Cross International Date Line" || normalized === "Crossing The Equator") {
        return null;
      }

      return Object.prototype.hasOwnProperty.call(DESTINATION_LOOKUP, normalized)
        ? DESTINATION_LOOKUP[normalized]
        : null;
    }

    function collectDestinationData(cruises) {
      const portsByCountry = {};

      cruises.forEach((cruise) => {
        // Exclude embarkation and disembarkation by ignoring the first and last itinerary stops.
        const stops = Array.isArray(cruise.itinerary) ? cruise.itinerary.slice(1, -1) : [];

        stops.forEach((stop) => {
          const countryCode = getDestinationCode(stop);
          if (countryCode) {
            const normalized = normalizeStopName(stop);
            portsByCountry[countryCode] = portsByCountry[countryCode] || {};
            portsByCountry[countryCode][normalized] = (portsByCountry[countryCode][normalized] || 0) + 1;
          }
        });
      });

      const counts = Object.keys(portsByCountry).reduce(function(acc, countryCode) {
        acc[countryCode] = Object.keys(portsByCountry[countryCode] || {}).length;
        return acc;
      }, {});

      return { counts, portsByCountry };
    }

    function collectUsDestinationStateData(cruises) {
      const portsByState = {};

      cruises.forEach(function(cruise) {
        const stops = Array.isArray(cruise.itinerary) ? cruise.itinerary.slice(1, -1) : [];

        stops.forEach(function(stop) {
          const normalized = normalizeStopName(stop);
          const stateCode = US_DESTINATION_STATE_LOOKUP[normalized];

          if (!stateCode) {
            return;
          }

          portsByState[stateCode] = portsByState[stateCode] || {};
          portsByState[stateCode][normalized] = (portsByState[stateCode][normalized] || 0) + 1;
        });
      });

      const counts = Object.keys(portsByState).reduce(function(acc, stateCode) {
        acc[stateCode] = Object.keys(portsByState[stateCode] || {}).length;
        return acc;
      }, {});

      return { counts: counts, portsByState: portsByState };
    }

    function resolveUnitedStatesHoverState(event) {
      if (!event || !event.target || typeof event.target.getBBox !== "function") {
        return "USA";
      }

      const pathNode = event.target;
      const bbox = pathNode.getBBox();
      if (!bbox.width || !bbox.height) {
        return "USA";
      }

      const svg = pathNode.ownerSVGElement;
      if (!svg || typeof svg.createSVGPoint !== "function" || typeof pathNode.getScreenCTM !== "function") {
        return "USA";
      }

      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;

      const matrix = pathNode.getScreenCTM();
      if (!matrix) {
        return "USA";
      }

      const localPoint = point.matrixTransform(matrix.inverse());
      const relX = (localPoint.x - bbox.x) / bbox.width;
      const relY = (localPoint.y - bbox.y) / bbox.height;

      if (relX < 0.22) {
        return "AK";
      }

      if (relX < 0.5 && relY > 0.78) {
        return "HI";
      }

      return "USA";
    }

    function resolveHoverLocation(geo, data, event, usStateData) {
      if (geo && geo.id === "USA") {
        const stateCode = resolveUnitedStatesHoverState(event);
        if (stateCode !== "USA") {
          return {
            displayName: STATE_NAME_LOOKUP[stateCode] || stateCode,
            portCount: usStateData && usStateData.counts && typeof usStateData.counts[stateCode] === "number"
              ? usStateData.counts[stateCode]
              : 0
          };
        }
      }

      return {
        displayName: (geo && geo.properties && geo.properties.name) || (data && data.label) || COUNTRY_NAME_LOOKUP[geo.id] || geo.id,
        portCount: data && typeof data.portCount === "number" ? data.portCount : 0
      };
    }

    function getCategoryMatchedPorts(cruise, definition) {
      const stops = Array.isArray(cruise.itinerary) ? cruise.itinerary.slice(1, -1) : [];
      const matched = new Set();
      const portNames = new Set(definition.portNames || []);
      const countryCodes = new Set(definition.countryCodes || []);

      stops.forEach(function(stop) {
        const normalized = normalizeStopName(stop);
        const countryCode = getDestinationCode(stop);

        if (portNames.has(normalized)) {
          matched.add(normalized);
          return;
        }

        if (countryCodes.size && countryCode && countryCodes.has(countryCode)) {
          matched.add(normalized);
        }
      });

      return matched;
    }

    function cruiseMatchesCategory(cruise, definition) {
      const matchedPorts = getCategoryMatchedPorts(cruise, definition);
      if (matchedPorts.size) {
        return matchedPorts;
      }

      if (definition.titlePattern && definition.titlePattern.test(String(cruise.itineraryTitle || ""))) {
        return new Set(Array.isArray(cruise.itinerary) ? cruise.itinerary.slice(1, -1).map(normalizeStopName).filter(Boolean) : []);
      }

      if (definition.regionPattern && definition.regionPattern.test(String(cruise.regionName || ""))) {
        return new Set(Array.isArray(cruise.itinerary) ? cruise.itinerary.slice(1, -1).map(normalizeStopName).filter(Boolean) : []);
      }

      return new Set();
    }

    function getAllCruiseDestinationPorts(cruise) {
      const stops = Array.isArray(cruise.itinerary) ? cruise.itinerary.slice(1, -1) : [];
      const matched = new Set();

      stops.forEach(function(stop) {
        const normalized = normalizeStopName(stop);
        if (normalized && getDestinationCode(stop)) {
          matched.add(normalized);
        }
      });

      return matched;
    }

    function getCruiseIdentity(cruise) {
      return String(
        cruise.sailingId ||
        [
          cruise.departureDate || "",
          cruise.arrivalDate || "",
          cruise.shipName || "",
          cruise.itineraryTitle || "",
          cruise.departurePortName || ""
        ].join("|")
      );
    }

    function buildCruiseSummary(cruise, matchedPorts) {
      return {
        sailingId: cruise.sailingId || "",
        departureDate: cruise.departureDate || "",
        arrivalDate: cruise.arrivalDate || "",
        duration: Number(cruise.duration) || 0,
        shipName: cruise.shipName || "",
        itineraryTitle: cruise.itineraryTitle || "",
        itineraryRoute: cruise.itineraryRoute || "",
        regionName: cruise.regionName || "",
        departurePortName: cruise.departurePortName || "",
        itinerary: Array.isArray(cruise.itinerary) ? cruise.itinerary.slice() : [],
        itineraryPorts: Array.from(getAllCruiseDestinationPorts(cruise)).sort(function(a, b) { return a.localeCompare(b); }),
        matchedPorts: Array.from(matchedPorts || getAllCruiseDestinationPorts(cruise)).sort(function(a, b) { return a.localeCompare(b); })
      };
    }

    function expandTrailingStateCode(text) {
      const value = String(text || "");
      return value.replace(/, ([A-Z]{2})$/g, function(match, stateCode) {
        return STATE_NAME_LOOKUP[stateCode] ? ", " + STATE_NAME_LOOKUP[stateCode] : match;
      });
    }

    function stripTrailingRegion(text) {
      return String(text || "").replace(/, [^,]+$/, "");
    }

    function formatNaturalList(items) {
      const values = (items || []).filter(Boolean);
      if (!values.length) {
        return "";
      }
      if (values.length === 1) {
        return values[0];
      }
      if (values.length === 2) {
        return values[0] + " and " + values[1];
      }
      return values.slice(0, -1).join(", ") + ", and " + values[values.length - 1];
    }

    function buildItineraryNarrative(cruise) {
      const stops = Array.isArray(cruise.itinerary) ? cruise.itinerary.map(normalizeStopName).filter(Boolean) : [];
      if (stops.length < 2) {
        return "The itinerary details are currently unavailable.";
      }

      const embarkation = stripTrailingRegion(expandTrailingStateCode(stops[0]));
      const disembarkation = stripTrailingRegion(expandTrailingStateCode(stops[stops.length - 1]));
      const middleStops = stops.slice(1, -1).filter(function(stop) {
        return !!getDestinationCode(stop);
      }).map(function(stop) {
        return stripTrailingRegion(expandTrailingStateCode(stop));
      }).filter(Boolean);

      if (!middleStops.length) {
        if (embarkation === disembarkation) {
          return "The itinerary begins in " + embarkation + " and returns to " + disembarkation + ".";
        }
        return "The itinerary begins in " + embarkation + " and ends in " + disembarkation + ".";
      }

      if (embarkation === disembarkation) {
        return "The itinerary begins in " + embarkation + ", then sails to " + formatNaturalList(middleStops) + ", before returning to " + disembarkation + ".";
      }

      return "The itinerary begins in " + embarkation + ", then sails to " + formatNaturalList(middleStops) + ", before ending in " + disembarkation + ".";
    }

    function buildFullRouteDisplay(cruise) {
      const stops = Array.isArray(cruise.itinerary) ? cruise.itinerary.map(normalizeStopName).filter(Boolean) : [];
      if (stops.length < 2) {
        return cruise.itineraryRoute || "No route available";
      }

      const firstStop = stops[0];
      const lastStop = stops[stops.length - 1];
      const middleStops = stops.slice(1, -1);

      return "Start: " + firstStop +
        (middleStops.length ? " > " + middleStops.join(" > ") : "") +
        " > End: " + lastStop;
    }

    function buildOfferCountSentence(eligibleOfferCount) {
      if (eligibleOfferCount === 1) {
        return "there is currently 1 available offer for this sailing.";
      }
      if (eligibleOfferCount === 0) {
        return "there are currently no available offer for this sailing.";
      }
      return "there are currently " + eligibleOfferCount + " available offers for this sailing.";
    }

    function buildCruiseNarrative(cruise, finalPaymentDueLabel, depositLabel, eligibleOfferCount, isRecommended) {
      const cruiseTitleBase = expandTrailingStateCode(cruise.itineraryTitle || "Cruise itinerary");
      const cruiseTitle = / cruise /i.test(cruiseTitleBase)
        ? cruiseTitleBase
        : cruiseTitleBase.replace(/ from /i, " cruise from ");
      const shipName = cruise.shipName || "Carnival ship";
      const startDate = formatCruiseDateLong(cruise.departureDate);
      const endDate = formatCruiseDateLong(cruise.arrivalDate);
      const finalPaymentSentence = finalPaymentDueLabel === "Final Payment Due Now"
        ? "Final payment is due now"
        : "Final payment is due " + finalPaymentDueLabel;
      const depositSentence = finalPaymentDueLabel === "Final Payment Due Now" || !depositLabel
        ? ""
        : ", deposit is " + depositLabel;

      return "Here's " +
        (isRecommended ? "a recommended " : "a ") +
        cruiseTitle +
        ", aboard " + shipName +
        ", sailing " + startDate + " through " + endDate + ". " +
        buildItineraryNarrative(cruise) + " " +
        finalPaymentSentence + depositSentence + ", and " +
        buildOfferCountSentence(eligibleOfferCount);
    }

    function computeCategoryStats(cruises) {
      const categoryStats = {};
      const groupPortSets = {
        americas: new Set(),
        "australia-south-pacific": new Set(),
        "europe-asia": new Set(),
        "featured-destinations": new Set()
      };
      const groupCruises = {
        americas: [],
        "australia-south-pacific": [],
        "europe-asia": [],
        "featured-destinations": []
      };
      const groupCruiseKeys = {
        americas: new Set(),
        "australia-south-pacific": new Set(),
        "europe-asia": new Set(),
        "featured-destinations": new Set()
      };
      const groupMonthCounts = {
        americas: {},
        "australia-south-pacific": {},
        "europe-asia": {},
        "featured-destinations": {}
      };
      const allPortSet = new Set();
      const allCruises = [];
      const allMonthCounts = {};

      Object.keys(CATEGORY_DEFINITIONS).forEach(function(key) {
        const definition = CATEGORY_DEFINITIONS[key];
        const portSet = new Set();
        let itineraryCount = 0;
        const cruisesForCategory = [];
        const monthCounts = {};

        cruises.forEach(function(cruise) {
          const matchedPorts = cruiseMatchesCategory(cruise, definition);
          if (!matchedPorts.size) {
            return;
          }

          itineraryCount += 1;
          const yearMonth = String(cruise.departureDate || "").slice(0, 7);
          if (yearMonth) {
            monthCounts[yearMonth] = (monthCounts[yearMonth] || 0) + 1;
          }
          cruisesForCategory.push(buildCruiseSummary(cruise, matchedPorts));
          matchedPorts.forEach(function(port) {
            portSet.add(port);
            groupPortSets[definition.group].add(port);
          });

          const cruiseKey = getCruiseIdentity(cruise);
          if (!groupCruiseKeys[definition.group].has(cruiseKey)) {
            groupCruiseKeys[definition.group].add(cruiseKey);
            groupCruises[definition.group].push(buildCruiseSummary(cruise, matchedPorts));
            if (yearMonth) {
              groupMonthCounts[definition.group][yearMonth] = (groupMonthCounts[definition.group][yearMonth] || 0) + 1;
            }
          }
        });

        categoryStats[key] = {
          group: definition.group,
          portSet: portSet,
          portCount: portSet.size,
          itineraryCount: itineraryCount,
          cruises: cruisesForCategory.sort(function(a, b) {
            return String(a.departureDate).localeCompare(String(b.departureDate));
          }),
          monthCounts: monthCounts
        };
      });

      const groupStats = Object.keys(groupPortSets).reduce(function(acc, groupKey) {
        acc[groupKey] = {
          portSet: groupPortSets[groupKey],
          portCount: groupPortSets[groupKey].size,
          itineraryCount: groupCruises[groupKey].length,
          cruises: groupCruises[groupKey].sort(function(a, b) {
            return String(a.departureDate).localeCompare(String(b.departureDate));
          }),
          monthCounts: groupMonthCounts[groupKey]
        };
        return acc;
      }, {});

      cruises.forEach(function(cruise) {
        const matchedPorts = getAllCruiseDestinationPorts(cruise);
        const yearMonth = String(cruise.departureDate || "").slice(0, 7);

        if (yearMonth) {
          allMonthCounts[yearMonth] = (allMonthCounts[yearMonth] || 0) + 1;
        }

        matchedPorts.forEach(function(port) {
          allPortSet.add(port);
        });

        allCruises.push(buildCruiseSummary(cruise, matchedPorts));
      });

      const allStats = {
        portSet: allPortSet,
        portCount: allPortSet.size,
        itineraryCount: allCruises.length,
        cruises: allCruises.sort(function(a, b) {
          return String(a.departureDate).localeCompare(String(b.departureDate));
        }),
        monthCounts: allMonthCounts
      };

      return { categoryStats, groupStats, allStats };
    }

      if (!dateString) {

      const date = new Date(dateString + "T00:00:00");

      if (!yearMonth || !/^\d{4}-\d{2}$/.test(yearMonth)) {
        return "";

      const year = yearMonth.slice(0, 4);
      const monthIndex = Number(yearMonth.slice(5, 7)) - 1;

    function getYearMonthFromDate(date) {
      return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
    }

    function parseYearMonth(yearMonth) {
      if (!yearMonth || !/^\d{4}-\d{2}$/.test(yearMonth)) {
        return null;
      }
      return new Date(Number(yearMonth.slice(0, 4)), Number(yearMonth.slice(5, 7)) - 1, 1, 12, 0, 0, 0);
    }

    function shiftYearMonth(yearMonth, deltaMonths) {
      const date = parseYearMonth(yearMonth);
      if (!date) {
        return null;
      }
      date.setMonth(date.getMonth() + deltaMonths);
      return getYearMonthFromDate(date);
    }

    function getNormalizedSelectedDateRange() {
      if (!currentDateFilter) {

      }
      const start = currentDateFilter;
      const end = currentDateRangeEnd || currentDateFilter;
      return start <= end ? { start: start, end: end } : { start: end, end: start };

    function buildDateRangeMonthCalendar(yearMonth, availableDepartureDates, selectedRange) {
      const firstOfMonth = parseYearMonth(yearMonth);
      if (!firstOfMonth) {
        return "";
      }

      const year = firstOfMonth.getFullYear();
      const monthIndex = firstOfMonth.getMonth();
      const firstWeekday = new Date(year, monthIndex, 1).getDay();
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const weekdayLabels = ["S", "M", "T", "W", "T", "F", "S"];
      const dayCells = [];

      for (let i = 0; i < firstWeekday; i += 1) {
        dayCells.push('<span class="date-range-day is-empty">.</span>');
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const dateValue = yearMonth + "-" + String(day).padStart(2, "0");
        const isAvailable = availableDepartureDates.has(dateValue);
        const isSelected = selectedRange && dateValue >= selectedRange.start && dateValue <= selectedRange.end;
        const isRangeStart = Boolean(isSelected && selectedRange && dateValue === selectedRange.start);
        const isRangeEnd = Boolean(isSelected && selectedRange && dateValue === selectedRange.end);
        const isRangeSingle = Boolean(isRangeStart && isRangeEnd);
        const classes = [
          "date-range-day",
          isAvailable ? "is-available" : "",
          isSelected ? "is-selected" : "",
          isRangeSingle ? "range-single" : "",
          isRangeStart && !isRangeSingle ? "range-start" : "",
          isRangeEnd && !isRangeSingle ? "range-end" : ""
        ].filter(Boolean).join(" ");
        const dataAttr = ' data-date-value="' + dateValue + '"';
        const typeAttr = ' type="button"';
        dayCells.push('<button class="' + classes + '"' + typeAttr + dataAttr + ">" + day + "</button>");
      }

      return '<section class="date-range-month">' +
        '<h4 class="date-range-month-title">' + formatYearMonthLabel(yearMonth) + "</h4>" +
        '<div class="date-range-weekdays">' + weekdayLabels.map(function(label) {
          return "<span>" + label + "</span>";
        }).join("") + "</div>" +
        '<div class="date-range-days">' + dayCells.join("") + "</div>" +
      "</section>";
    }

    function getShiftedCruiseDate(dateString, monthsDelta) {
      if (!dateString) {
        return null;
      }
      const date = new Date(dateString + "T12:00:00");
      if (Number.isNaN(date.getTime())) {
        return null;
      }
      date.setMonth(date.getMonth() + monthsDelta);
      return date;
    }

    function formatDateObject(date) {
      if (!date || Number.isNaN(date.getTime())) {
        return "";
      }
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    function getTodayDateObject() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return today;
    }

    function matchesDurationFilters(duration, filters) {
      const activeFilters = Array.isArray(filters) ? filters : [];
      if (!activeFilters.length) {
        return true;
      }

      return activeFilters.some(function(filterKey) {
        if (filterKey === "2-5") {
          return duration >= 2 && duration <= 5;
        }
        if (filterKey === "6-9") {
          return duration >= 6 && duration <= 9;
        }
        if (filterKey === "10+") {
          return duration >= 10;
        }
        return false;
      });
    }

    function formatDurationFilterButtonText(filters) {
      const activeFilters = Array.isArray(filters) ? filters : [];
      if (!activeFilters.length) {
        return "All Durations";
      }

      const labels = DURATION_FILTER_OPTIONS.filter(function(option) {
        return activeFilters.indexOf(option.key) !== -1;
      }).map(function(option) {
        return option.label;
      });

      if (labels.length <= 2) {
        return labels.join(", ");
      }

      return labels.length + " Durations";
    }

    function formatDurationCopy(filters) {
      const activeFilters = Array.isArray(filters) ? filters : [];
      if (!activeFilters.length) {
        return "";
      }

      const labels = DURATION_FILTER_OPTIONS.filter(function(option) {
        return activeFilters.indexOf(option.key) !== -1;
      }).map(function(option) {
        return option.label;
      });

      return " for " + labels.join(", ") + " cruises";
    }

    function getSeasonalRecommendationKeys(date) {
      const targetDate = date instanceof Date ? new Date(date.getTime()) : getTodayDateObject();
      targetDate.setHours(0, 0, 0, 0);
      const monthDay = (targetDate.getMonth() + 1) * 100 + targetDate.getDate();

      if (monthDay >= 301 && monthDay <= 531) {
        return SEASONAL_RECOMMENDATIONS.spring;
      }

      if (monthDay >= 601 && monthDay <= 831) {
        return SEASONAL_RECOMMENDATIONS.summer;
      }

      if (monthDay >= 901 && monthDay <= 1130) {
        return SEASONAL_RECOMMENDATIONS.fall;
      }

      return SEASONAL_RECOMMENDATIONS.winter;
    }

    function getRecommendedCategoryKeysForCruise(cruise, date) {
      const seasonalKeys = getSeasonalRecommendationKeys(date);

      return Object.keys(CATEGORY_DEFINITIONS).filter(function(categoryKey) {
        if (!seasonalKeys.has(categoryKey)) {
          return false;
        }

        return cruiseMatchesCategory(cruise, CATEGORY_DEFINITIONS[categoryKey]).size > 0;
      });
    }

    function getShiftedCruiseDateByDays(dateString, daysDelta) {
      if (!dateString) {
        return null;
      }
      const date = new Date(dateString + "T12:00:00");
      if (Number.isNaN(date.getTime())) {
        return null;
      }
      date.setDate(date.getDate() + daysDelta);
      return date;
    }

    function getFinalPaymentDueDate(cruise) {
      const duration = Number(cruise.duration) || 0;
      const dueDays = duration >= 2 && duration <= 5 ? 76 : duration >= 6 ? 91 : 0;
      if (!dueDays) {
        return null;
      }
      return getShiftedCruiseDateByDays(cruise.departureDate, -dueDays);
    }

    function getFinalPaymentDueLabel(cruise) {
      const dueDate = getFinalPaymentDueDate(cruise);
      if (!dueDate) {
        return "Unavailable";
      }

      const today = getTodayDateObject();
      dueDate.setHours(0, 0, 0, 0);

      return dueDate.getTime() <= today.getTime()
        ? "Final Payment Due Now"
        : formatDateObject(dueDate);
    }

    function getDepositLabels(cruise) {
      const duration = Number(cruise.duration) || 0;
      const finalPaymentDueLabel = getFinalPaymentDueLabel(cruise);

      if (finalPaymentDueLabel === "Final Payment Due Now") {
        return {
          deposit: "Final Payment Due Now",
          singleOccupancy: "Final Payment Due Now"
        };
      }

      if (duration >= 2 && duration <= 3) {
        return {
          deposit: "$100 USD per person",
          singleOccupancy: "$200 USD"
        };
      }

      if (duration >= 4 && duration <= 5) {
        return {
          deposit: "$150 USD per person",
          singleOccupancy: "$300 USD"
        };
      }

      if (duration >= 6 && duration <= 9) {
        return {
          deposit: "$250 USD per person",
          singleOccupancy: "$500 USD"
        };
      }

      if (duration >= 10) {
        return {
          deposit: "$400 USD per person",
          singleOccupancy: "$800 USD"
        };
      }

      return {
        deposit: "Unavailable",
        singleOccupancy: "Unavailable"
      };
    }

    function getEarlySaverOfferCopy(cruise) {
      const duration = Number(cruise.duration) || 0;
      const closesMonths = duration > 0 && duration <= 5 ? 3 : 5;
      const closeDate = getShiftedCruiseDate(cruise.departureDate, -closesMonths);
      const sailDate = getShiftedCruiseDateByDays(cruise.departureDate, 0);
      const closeLabel = formatDateObject(closeDate);
      const sailLabel = formatDateObject(sailDate);
      const today = getTodayDateObject();
      const isExpired = closeDate ? closeDate.getTime() < today.getTime() : false;

      return {
        title: "Early Saver: PPB",
        status: isExpired ? "Not Eligible" : "Eligible",
        detail: closeLabel
          ? (isExpired ? (closeLabel + " to " + sailLabel) : (formatDateObject(today) + " to " + closeLabel))
          : "Close date unavailable"
      };
    }

    function getFunSelectOfferCopy(cruise) {
      const dueDate = getFinalPaymentDueDate(cruise);
      if (!dueDate) {
        return {
          title: "Fun Select: PNS",
          status: "Not Eligible",
          detail: "Close date unavailable"
        };
      }

      const dueLabel = formatDateObject(dueDate);
      const sailDate = getShiftedCruiseDateByDays(cruise.departureDate, 0);
      const sailLabel = formatDateObject(sailDate);
      const today = getTodayDateObject();
      dueDate.setHours(0, 0, 0, 0);

      return {
        title: "Fun Select: PNS",
        status: dueDate.getTime() <= today.getTime() ? "Not Eligible" : "Eligible",
        detail: dueDate.getTime() <= today.getTime()
          ? (dueLabel + " to " + sailLabel)
          : (formatDateObject(today) + " to " + dueLabel)
      };
    }

    function getSuperSaverOfferCopy(cruise) {
      const dueDate = getFinalPaymentDueDate(cruise);
      const superSaverStartDate = dueDate ? new Date(dueDate.getTime()) : null;
      const superSaverEndDate = getShiftedCruiseDateByDays(cruise.departureDate, -1);
      if (!dueDate || !superSaverStartDate || !superSaverEndDate) {
        return {
          title: "Super Saver: PSV",
          status: "Not Eligible",
          detail: "Eligibility window unavailable"
        };
      }

      superSaverStartDate.setDate(superSaverStartDate.getDate() + 1);

      const today = getTodayDateObject();
      const originalStartLabel = formatDateObject(superSaverStartDate);
      const endLabel = formatDateObject(superSaverEndDate);
      superSaverEndDate.setHours(0, 0, 0, 0);
      const isEligible = superSaverStartDate.getTime() <= today.getTime() && superSaverEndDate.getTime() >= today.getTime();

      return {
        title: "Super Saver: PSV",
        status: isEligible ? "Eligible" : "Not Eligible",
        detail: originalStartLabel + " to " + endLabel
      };
    }

    function cloneTopo(topo) {
      return JSON.parse(JSON.stringify(topo));

    function loadDrilldownTopo(countryCode) {
      const config = DRILLDOWN_COUNTRY_CONFIG[countryCode];

      if (!config || config.scope === "usa") {
        return Promise.resolve(null);
      }

      const topo = BASE_DATAMAP_CONSTRUCTOR && BASE_DATAMAP_CONSTRUCTOR.prototype
        ? BASE_DATAMAP_CONSTRUCTOR.prototype[config.scope + "Topo"]
        : null;

      if (!topo || typeof topo === "string") {
        return Promise.reject(new Error("Drilldown topo was not available for " + countryCode));
      }

      return Promise.resolve(cloneTopo(topo));
    }

    function buildFittedProjection(element, topo, scope, paddingFactor) {
      const width = element.offsetWidth || element.clientWidth || 960;
      const height = element.offsetHeight || element.clientHeight || 600;
      const sourceCollection = topojson.feature(topo, topo.objects[scope]);
      const featureCollection = scope === "world" && Array.isArray(sourceCollection.features)
        ? {
            type: "FeatureCollection",
            features: sourceCollection.features.filter(function(feature) {
              return feature && feature.id !== "ATA";
            })
          }
        : sourceCollection;
      const projection = d3.geo.mercator().scale(1).translate([0, 0]);
      const path = d3.geo.path().projection(projection);
      const bounds = path.bounds(featureCollection);
      const boundsWidth = bounds[1][0] - bounds[0][0];
      const boundsHeight = bounds[1][1] - bounds[0][1];
      const scale = (paddingFactor || 0.92) / Math.max(boundsWidth / width, boundsHeight / height);
      const translate = [
        (width - scale * (bounds[1][0] + bounds[0][0])) / 2,
        (height - scale * (bounds[1][1] + bounds[0][1])) / 2
      ];

      projection.scale(scale).translate(translate);

      return {
        path: d3.geo.path().projection(projection),
        projection: projection
      };
    }

    function buildProjectionWithState(element, topo, scope, paddingFactor) {
      const result = buildFittedProjection(element, topo, scope, paddingFactor);
      currentMapProjection = result.projection;
      return result;
    }

    function getMapRootLayers() {
      if (!mapInstance || !mapInstance.svg) {
        return d3.selectAll([]);
      }

      const svgNode = typeof mapInstance.svg.node === "function"
        ? mapInstance.svg.node()
        : mapInstance.svg[0][0];
      const layers = Array.prototype.filter.call(svgNode.children || [], function(child) {
        return child.tagName && child.tagName.toLowerCase() === "g";

    function getMapViewportSize() {
      const mapEl = document.getElementById("map");
      if (mapEl) {
        return {
          width: mapEl.clientWidth || mapEl.offsetWidth || 960,
          height: mapEl.clientHeight || mapEl.offsetHeight || 600
        };
      }

      return { width: 960, height: 600 };
    }

    function normalizeMapTransform(transform) {
      if (!transform) {
        return { x: 0, y: 0, scale: 1 };
      }

      if (typeof transform === "object") {
        return {
          x: Number(transform.x) || 0,
          y: Number(transform.y) || 0,
          scale: Number(transform.scale) || 1
        };
      }

      const match = String(transform).match(/translate\(([-\d.]+),([-\d.]+)\)\s*scale\(([-\d.]+)\)/);
      if (!match) {
        return { x: 0, y: 0, scale: 1 };
      }

      return {
        x: Number(match[1]) || 0,
        y: Number(match[2]) || 0,
        scale: Number(match[3]) || 1
      };
    }

    function formatMapTransform(transform) {
      const normalized = normalizeMapTransform(transform);
      if (normalized.scale === 1 && normalized.x === 0 && normalized.y === 0) {
        return null;
      }

      return "translate(" + normalized.x + "," + normalized.y + ") scale(" + normalized.scale + ")";
    }

    function updateMapPanState() {
      const mapEl = document.getElementById("map");
      if (!mapEl) {
        return;
      }

      mapEl.classList.toggle("is-pannable", currentMapTransform.scale > 1);
      mapEl.classList.toggle("is-dragging", !!mapPanState.dragging);
    }

    function applyMapTransform(transform, duration) {
      currentMapTransform = normalizeMapTransform(transform);
      updateMapPanState();

      const layers = getMapRootLayers();
      const transformValue = formatMapTransform(currentMapTransform);

      if (duration) {
        layers
          .transition()
          .duration(duration)
          .attr("transform", transformValue);
        return;
      }

      layers.interrupt().attr("transform", transformValue);
    }

    function bindMapPanControls() {
      const mapEl = document.getElementById("map");
      if (!mapEl || mapEl.dataset.panBound === "true") {
        updateMapPanState();
        return;
      }

      mapEl.dataset.panBound = "true";

      mapEl.addEventListener("mousedown", function(event) {
        if (currentMapTransform.scale <= 1 || event.button !== 0 || event.target.closest(".map-overlay")) {
          return;
        }

        mapPanState.dragging = true;
        mapPanState.startX = event.clientX;
        mapPanState.startY = event.clientY;
        mapPanState.originX = currentMapTransform.x;
        mapPanState.originY = currentMapTransform.y;
        updateMapPanState();
        event.preventDefault();
      });

      window.addEventListener("mousemove", function(event) {
        if (!mapPanState.dragging) {
          return;
        }

        applyMapTransform({
          x: mapPanState.originX + (event.clientX - mapPanState.startX),
          y: mapPanState.originY + (event.clientY - mapPanState.startY),
          scale: currentMapTransform.scale
        }, 0);
      });

      window.addEventListener("mouseup", function() {
        if (!mapPanState.dragging) {
          return;
        }

        mapPanState.dragging = false;
        updateMapPanState();
      });

      mapEl.addEventListener("wheel", function(event) {
        if (currentMapTransform.scale <= 1 || event.target.closest(".map-overlay")) {
          return;
        }

        event.preventDefault();
        applyMapTransform({
          x: currentMapTransform.x - event.deltaX,
          y: currentMapTransform.y - event.deltaY,
          scale: currentMapTransform.scale
        }, 0);
      }, { passive: false });

      updateMapPanState();
    }

    function bindMapViewControls() {
      const recenterButton = document.getElementById("recenterMapButton");
      if (!recenterButton || recenterButton.dataset.bound === "true") {

    function applyCoordinateZoom(override) {
      if (!override || !currentMapProjection || !mapInstance || !mapInstance.svg) {
        return false;
      }

      const point = currentMapProjection([override.longitude, override.latitude]);
      if (!point || point.length < 2) {
        return false;
      }

      const viewport = getMapViewportSize();
      const svgWidth = viewport.width;
      const svgHeight = viewport.height;
      const scale = override.scale || 18;
      const translateX = svgWidth / 2 - scale * point[0];
      const translateY = svgHeight / 2 - scale * point[1];
      const transform = "translate(" + translateX + "," + translateY + ") scale(" + scale + ")";

      applyMapTransform(transform, 300);
      return true;
    }

    function zoomToOverride(countryCode) {
      return applyCoordinateZoom(COUNTRY_ZOOM_OVERRIDES[countryCode]);

    function zoomToCountry(node) {
      if (!mapInstance || !node) {
        return;
      }

      const bbox = node.getBBox();
      if (!bbox.width || !bbox.height) {
        return;
      }

      const viewport = getMapViewportSize();
      const svgWidth = viewport.width;
      const svgHeight = viewport.height;
      const relativeSize = Math.max(bbox.width / svgWidth, bbox.height / svgHeight);
      const maxScale = relativeSize < 0.04 ? 12 : 5;
      const scale = Math.max(1, Math.min(maxScale, 0.42 / relativeSize));
      const translateX = svgWidth / 2 - scale * (bbox.x + bbox.width / 2);
      const translateY = svgHeight / 2 - scale * (bbox.y + bbox.height / 2);
      const transform = "translate(" + translateX + "," + translateY + ") scale(" + scale + ")";

      applyMapTransform(transform, 300);
    }

    function findCountryNode(countryCode) {
      if (!mapInstance || !mapInstance.svg || !countryCode) {
        return null;
      }

      let match = null;
      mapInstance.svg.selectAll(".datamaps-subunit").each(function(d) {
        if (!match && d && d.id === countryCode) {
          match = this;
        }
      });

      return match;
    }

    function zoomToCountryCodes(countryCodes) {
      if (!mapInstance || !mapInstance.svg || !countryCodes || !countryCodes.length) {
        return;
      }

      if (countryCodes.length === 1 && zoomToOverride(countryCodes[0])) {
        return;
      }

      const nodes = countryCodes
        .map(findCountryNode)
        .filter(Boolean);

      if (!nodes.length) {
        return;
      }

      if (nodes.length === 1) {
        zoomToCountry(nodes[0]);
        return;
      }

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      nodes.forEach(function(node) {
        const bbox = node.getBBox();
        if (!bbox.width || !bbox.height) {
          return;
        }
        minX = Math.min(minX, bbox.x);
        minY = Math.min(minY, bbox.y);
        maxX = Math.max(maxX, bbox.x + bbox.width);
        maxY = Math.max(maxY, bbox.y + bbox.height);
      });

      if (!isFinite(minX) || !isFinite(minY) || !isFinite(maxX) || !isFinite(maxY)) {
        return;
      }

      const bbox = {
        x: minX,
        y: minY,
        width: maxX - minX,
        height: maxY - minY
      };

      const viewport = getMapViewportSize();
      const svgWidth = viewport.width;
      const svgHeight = viewport.height;
      const relativeSize = Math.max(bbox.width / svgWidth, bbox.height / svgHeight);
      const maxScale = relativeSize < 0.04 ? 12 : 5;
      const scale = Math.max(1, Math.min(maxScale, 0.42 / relativeSize));
      const translateX = svgWidth / 2 - scale * (bbox.x + bbox.width / 2);
      const translateY = svgHeight / 2 - scale * (bbox.y + bbox.height / 2);
      const transform = "translate(" + translateX + "," + translateY + ") scale(" + scale + ")";

      applyMapTransform(transform, 300);
    }

    function formatRefreshTimestamp(value) {
      if (!value) {
        return "Unknown";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }

      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    async function configureRefreshControls() {
      const controlsEl = document.getElementById("refreshControls");
      if (!controlsEl) {
        return;
      }

      controlsEl.hidden = true;

      try {
        const response = await fetch("./healthz", { cache: "no-store" });
        if (!response.ok) {
          return;
        }

        const payload = await response.json().catch(function() {
          return {};
        });

        if (!payload || !payload.ok) {
          return;
        }

        const destinationsResponse = await fetch("./destinations.json", { cache: "no-store" });
        if (!destinationsResponse.ok) {
          return;
        }

        const destinationsPayload = await destinationsResponse.json().catch(function() {
          return {};
        });
        const metadata = destinationsPayload && destinationsPayload.__cruises_metadata
          ? destinationsPayload.__cruises_metadata
          : {};

        controlsEl.hidden = !isQuarterlyRefreshDue(metadata.merged_at);
      } catch (error) {
      }
    }

    function getQuarterStartForDate(value) {
      const date = value instanceof Date ? new Date(value.getTime()) : new Date(value);
      if (Number.isNaN(date.getTime())) {
        return null;
      }

      const month = date.getMonth();
      const quarterStartMonth = month < 3 ? 0 : (month < 6 ? 3 : (month < 9 ? 6 : 9));
      return new Date(date.getFullYear(), quarterStartMonth, 1);
    }

    function isQuarterlyRefreshDue(mergedAtValue) {
      const now = new Date();
      const currentQuarterStart = getQuarterStartForDate(now);
      const mergedAt = mergedAtValue ? new Date(mergedAtValue) : null;

      if (!currentQuarterStart) {
        return false;
      }

      if (!mergedAt || Number.isNaN(mergedAt.getTime())) {
        return true;
      }

      return mergedAt.getTime() < currentQuarterStart.getTime();
    }

      const statusEl = document.getElementById("refreshMergedStatus");
      if (!statusEl) {

    function updateRefreshStatusFromPayload(mergedPayload) {
      const metadata = mergedPayload && mergedPayload.__cruises_metadata ? mergedPayload.__cruises_metadata : {};
      const mergedAt = metadata.merged_at ? formatRefreshTimestamp(metadata.merged_at) : "Unknown";
      const cruisesAt = metadata.cruises_generated_at ? formatRefreshTimestamp(metadata.cruises_generated_at) : "";
      const sailingCount = typeof metadata.total_cruise_sailings === "number" ? metadata.total_cruise_sailings : null;
      const cruisePart = cruisesAt ? " Cruise data: " + cruisesAt + "." : "";
      const sailingPart = sailingCount !== null ? " " + sailingCount + " sailings merged." : "";
      setRefreshStatus("Merged: " + mergedAt + "." + cruisePart + sailingPart, "success");
    }

    async function handleRefreshMergedData() {
      if (refreshInFlight) {
        return;
      }

      const button = document.getElementById("refreshMergedButton");
      refreshInFlight = true;
      if (button) {
        button.disabled = true;
        button.textContent = "Updating...";
      }
      setRefreshStatus("Refreshing destinations.json from Carnival...", "");

      try {
        const response = await fetch("./refresh-destinations", {
          method: "POST",
          cache: "no-store"
        });
        const result = await response.json().catch(function() {
          return {};
        });

        if (!response.ok) {
          throw new Error(result.error || "Refresh failed. Serve this page with destinations-manager.js to enable the update button.");
        }

        await loadMap();
        await configureRefreshControls();

        if (result && result.metadata) {
          const mergedAt = formatRefreshTimestamp(result.metadata.merged_at);
          const cruisesAt = result.metadata.cruises_generated_at ? formatRefreshTimestamp(result.metadata.cruises_generated_at) : "";
          setRefreshStatus("Updated merged data at " + mergedAt + "." + (cruisesAt ? " Cruise data: " + cruisesAt + "." : ""), "success");
        } else {
          setRefreshStatus("Updated merged data successfully.", "success");
        }
      } catch (error) {
        setRefreshStatus(error && error.message ? error.message : "Refresh failed.", "error");
      } finally {
        refreshInFlight = false;
        if (button) {
          button.disabled = false;
          button.textContent = "Update Latest Data";
        }
      }
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function normalizeDestinationKey(name, country) {
      return String(name + "||" + country)
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9|]+/g, " ")
        .trim();
    }

    function fillDestinationSelect(select, values, allLabel) {
      select.innerHTML = '<option value="">' + allLabel + '</option>' + values.map(function(value) {

    }

    function orderValuesByPreferred(values, preferredOrder) {
      const valueSet = new Set((values || []).filter(Boolean));
      const ordered = (preferredOrder || []).filter(function(value) {
        return valueSet.has(value);
      });
      const remaining = Array.from(valueSet).filter(function(value) {
        return preferredOrder.indexOf(value) === -1;
      }).sort(function(a, b) {
        return a.localeCompare(b);
      });
      return ordered.concat(remaining);
    }

    function refreshDestinationCruiseIdSet() {
      if (!currentDestinationSettingFilter) {
        currentDestinationCruiseIdSet = null;
        return;
      }

      currentDestinationCruiseIdSet = new Set(
        destinationGalleryData
          .filter(function(item) {
            return item.setting === currentDestinationSettingFilter;
          })
          .flatMap(function(item) {
            return getDestinationMatchedCruiseIds(item);
          })
          .map(function(cruiseId) {
            return String(cruiseId || "");
          })
          .filter(Boolean)
      );
    }

    function filterCruisesByDestinationSelections(cruises) {
      if (!currentDestinationCruiseIdSet) {
        return Array.isArray(cruises) ? cruises.slice() : [];
      }

      return (Array.isArray(cruises) ? cruises : []).filter(function(cruise) {
        return currentDestinationCruiseIdSet.has(String(cruise && cruise.sailingId || ""));
      });
    }

    function formatActiveDestinationFilterCopy() {
      const parts = [];
      if (currentDestinationSettingFilter) {
        parts.push("setting " + currentDestinationSettingFilter);
      }
      if (currentDestinationBestTimeFilter) {
        parts.push("best time " + currentDestinationBestTimeFilter);
      }
      return parts.length ? " matching " + parts.join(" and ") : "";
    }

    function resetItineraryDateSelectionState() {
      currentItineraryMonth = null;
      currentDateFilter = null;
      currentDateRangeEnd = null;
      currentDateRangeBaseMonth = null;
      draftItineraryMonth = null;
      draftDateFilter = null;
      draftDateRangeEnd = null;
      draftDateRangeBaseMonth = null;
      draftDateFilterTab = "months";
      isDateFilterPanelOpen = false;
    }

    function getSeasonLabelForDepartureDate(dateString) {
      if (!dateString) {
        return "";
      }

      const date = new Date(dateString + "T12:00:00");
      if (Number.isNaN(date.getTime())) {
        return "";
      }

      const month = date.getMonth() + 1;
      const day = date.getDate();
      const monthDay = month * 100 + day;

      if (monthDay >= 301 && monthDay <= 531) {
        return "Spring";
      }
      if (monthDay >= 601 && monthDay <= 831) {
        return "Summer";
      }
      if (monthDay >= 901 && monthDay <= 1130) {
        return "Fall";
      }
      return "Winter";
    }

    function matchesCurrentBestTimeFilter(cruise) {
      if (!currentDestinationBestTimeFilter) {
        return true;
      }
      return getSeasonLabelForDepartureDate(cruise && cruise.departureDate) === currentDestinationBestTimeFilter;
    }

    function filterCruisesByCurrentControls(cruises) {
      return (Array.isArray(cruises) ? cruises : []).filter(function(cruise) {
        if (currentDeparturePortFilter && cruise.departurePortName !== currentDeparturePortFilter) {
          return false;
        }
        if (!matchesCurrentBestTimeFilter(cruise)) {
          return false;
        }
        const duration = Number(cruise.duration) || 0;
        if (!matchesDurationFilters(duration, currentDurationFilters)) {
          return false;
        }
        if (currentItineraryMonth && String(cruise.departureDate || "").slice(0, 7) !== currentItineraryMonth) {
          return false;
        }
        if (currentDateFilter) {
          const selectedRange = getNormalizedSelectedDateRange();
          if (!selectedRange || cruise.departureDate < selectedRange.start || cruise.departureDate > selectedRange.end) {
            return false;
          }
        }
        return true;
      });
    }

    function getCurrentBaseCruises() {
      const baseStats = currentActiveCategoryKey
        ? currentCategoryStats.categoryStats[currentActiveCategoryKey]
        : currentCategoryStats.allStats;
      return filterCruisesByDestinationSelections(baseStats ? baseStats.cruises : []);
    }

    function getCurrentFilteredCruiseIdSet() {
      return new Set(
        filterCruisesByCurrentControls(getCurrentBaseCruises()).map(function(cruise) {
          return String(cruise && cruise.sailingId || "");
        }).filter(Boolean)
      );
    }

    function hasActiveCruiseFilters() {
      return Boolean(
        currentActiveCategoryKey ||
        currentDeparturePortFilter ||
        currentItineraryMonth ||
        currentDateFilter ||
        (Array.isArray(currentDurationFilters) && currentDurationFilters.length) ||
        currentDestinationBestTimeFilter
      );
    }

      if (!detail || !Array.isArray(detail.things_to_do) || !detail.things_to_do.length) {

            '</div>';
