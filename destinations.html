    function normalizeDestinationRouteValue(value) {
      return String(value || "")
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[™®]/g, "")
        .replace(/\([^)]*\)/g, " ")
        .replace(/\bsaint\b/gi, "st")
        .replace(/\bst\.\b/gi, "st")
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9]+/gi, " ")
        .trim()
        .toLowerCase();
    }

    function mapMergedCruiseToBrowserShape(rawCruise) {
      return {
        departureDate: rawCruise.departure_date || "",
        arrivalDate: rawCruise.arrival_date || "",
        departureTime: rawCruise.departure_time || "",
        returnTime: rawCruise.return_time || "",
        shipName: rawCruise.ship_name || "",
        itineraryTitle: rawCruise.itinerary_title || "",
        itineraryRoute: rawCruise.itinerary_route || "",
        itinerary: Array.isArray(rawCruise.itinerary) ? rawCruise.itinerary.slice() : [],
        itineraryUrl: rawCruise.itinerary_url || "",
        departurePortName: rawCruise.departure_port_name || "",
        regionName: rawCruise.region_name || "",
        duration: Number(rawCruise.duration) || 0,
        portsToDisplay: Array.isArray(rawCruise.ports_to_display) ? rawCruise.ports_to_display.slice() : [],
        sailingId: rawCruise.sailing_id || rawCruise.cruise_id || "",
        departurePortCode: rawCruise.departure_port_code || "",
        regionCode: rawCruise.region_code || ""
      };
    }

    function getDestinationRouteAliases(destination) {
      const aliases = new Set();
      const country = destination.country || "";
      const name = destination.name || "";

      aliases.add(normalizeDestinationRouteValue(name));
      if (/\|/.test(name)) {
        aliases.add(normalizeDestinationRouteValue(name.split("|")[0]));
      }
      if (/ province$/i.test(name)) {
        aliases.add(normalizeDestinationRouteValue(name.replace(/ province$/i, "")));
      }
      if (/ harbour$/i.test(name)) {
        aliases.add(normalizeDestinationRouteValue(name.replace(/ harbour$/i, "")));
      }
      if (/ town hall$/i.test(name)) {
        aliases.add(normalizeDestinationRouteValue(name.replace(/ town hall$/i, "")));
      }

      const exactAliases = {
        "Mexico||San Miguel de Cozumel": ["Cozumel"],
        "Mexico||Costa Maya | Cruise Port": ["Costa Maya"],
        "Puerto Rico||Viejo San Juan": ["San Juan"],
        "Turks and Caicos Islands||Cockburn Town": ["Grand Turk"],
        "U.S. Virgin Islands||Saint Thomas": ["St. Thomas"],
        "U.S. Virgin Islands||Frederiksted": ["St. Croix"],
        "Sint Maarten||Philipsburg": ["St. Maarten"],
        "Caribbean Netherlands||Kralendijk": ["Bonaire"],
        "Cayman Islands||George Town": ["Grand Cayman"],
        "Saint Michael Barbados||Bridgetown": ["Barbados"],
        "Belize||Belize City": ["Belize"],
        "Honduras||Coxen Hole": ["Mahogany Bay, Roatan", "Isla Tropicale, Roatan"],
        "Costa Rica||Limón Province": ["Limón"],
        "Costa Rica||Puntarenas Province": ["Puntarenas"],
        "Panama||Colón": ["Colón (Panama Canal)", "Colón"],
        "Aruba||Oranjestad": ["Aruba"],
        "Curaçao||Willemstad": ["Curaçao", "Curacao"],
        "The Bahamas||Lucayan Knoll": ["Celebration Key™", "Half Moon Cay", "RelaxAway, Half Moon Cay™", "Princess Cays", "Nassau", "Bimini"]
      };

      (exactAliases[country + "||" + name] || []).forEach(function(alias) {
        aliases.add(normalizeDestinationRouteValue(alias));
      });

      return Array.from(aliases).filter(Boolean);
    }

    function getDestinationMatchedCruises(destination) {
      const cruiseIndex = (currentMergedPayload && currentMergedPayload.__cruises_index) || {};
      const matched = new Map();
      const aliasSet = new Set(getDestinationRouteAliases(destination));

      (destination.cruiseIds || []).forEach(function(cruiseId) {
        const rawCruise = cruiseIndex[cruiseId];
        if (rawCruise) {
          matched.set(cruiseId, mapMergedCruiseToBrowserShape(rawCruise));
        }
      });

      Object.keys(cruiseIndex).forEach(function(cruiseId) {
        if (matched.has(cruiseId)) {
          return;
        }
        const rawCruise = cruiseIndex[cruiseId];
        const routePoints = []
          .concat(Array.isArray(rawCruise.itinerary) ? rawCruise.itinerary : [])
          .concat(rawCruise.departure_port_name || "")
          .concat(rawCruise.ports_to_display || []);
        const isMatch = routePoints.some(function(stop) {
          return aliasSet.has(normalizeDestinationRouteValue(normalizeStopName(stop)));
        });
        if (isMatch) {
          matched.set(cruiseId, mapMergedCruiseToBrowserShape(rawCruise));
        }
      });

      return Array.from(matched.values()).sort(function(a, b) {
        return String(a.departureDate || "").localeCompare(String(b.departureDate || "")) ||
          String(a.itineraryTitle || "").localeCompare(String(b.itineraryTitle || ""));
      });
    }

    function getDestinationMatchedCruiseIds(destination) {
      const cacheKey = destination && destination.key ? destination.key : "";
      if (!cacheKey) {
        return [];
      }

      if (destinationMatchedCruiseIdsCache.has(cacheKey)) {
        return destinationMatchedCruiseIdsCache.get(cacheKey);
      }

      const matchedCruiseIds = getDestinationMatchedCruises(destination).map(function(cruise) {
        return String(cruise && cruise.sailingId || "");
      }).filter(Boolean);

      destinationMatchedCruiseIdsCache.set(cacheKey, matchedCruiseIds);
      return matchedCruiseIds;
    }

    function renderDestinationCruises(destination) {
      const cruises = filterCruisesByCurrentControls(getDestinationMatchedCruises(destination));

      if (!cruises.length) {
        return '<div class="destination-block"><div class="destination-rich"><p>No itineraries match the current filters for this destination.</p></div></div>';
      }

      return '<section class="destination-block"><h3>Applicable Itineraries</h3><div class="destination-rich"><p>' +
        escapeHtml(destination.name) + ' appears in ' + escapeHtml(String(cruises.length)) + ' itinerary result' + (cruises.length === 1 ? '' : 's') + ' based on route matching.</p></div></section>' +
        '<ul class="itinerary-list">' + cruises.map(function(cruise, index) {
          const itineraryRoute = buildFullRouteDisplay(cruise);
          const finalPaymentDueLabel = getFinalPaymentDueLabel(cruise);
          const depositLabels = getDepositLabels(cruise);
          const showDepositPill = depositLabels.deposit !== finalPaymentDueLabel;
          const finalPaymentPillLabel = finalPaymentDueLabel === "Final Payment Due Now"
            ? finalPaymentDueLabel
            : "Final Payment Due: " + finalPaymentDueLabel;
          const offers = [
            getEarlySaverOfferCopy(cruise),
            getFunSelectOfferCopy(cruise),
            getSuperSaverOfferCopy(cruise)
          ];
          const eligibleOfferCount = offers.filter(function(offer) {
            return offer.status === "Eligible";
          }).length;
          const offersButtonLabel = eligibleOfferCount + " " + (eligibleOfferCount === 1 ? "Offer Found!" : "Offers Found!");
          const itineraryNarrative = buildCruiseNarrative(cruise, finalPaymentDueLabel, depositLabels.deposit, eligibleOfferCount, false);
          const offerId = "destination-itinerary-offer-" + escapeHtml(destination.key) + "-" + index;

          return '<li><strong>' + escapeHtml(cruise.itineraryTitle) + '</strong>' +
            '<div class="itinerary-pill-stack">' +
              (showDepositPill ? '<div class="itinerary-pill">' + escapeHtml(depositLabels.deposit) + '</div>' : '') +
              '<div class="itinerary-pill is-final-payment' + (finalPaymentDueLabel === "Final Payment Due Now" ? ' is-due-now' : '') + '">' + escapeHtml(finalPaymentPillLabel) + '</div>' +
            '</div>' +
            '<div class="itinerary-meta">' + escapeHtml(formatCruiseDate(cruise.departureDate)) + ' to ' + escapeHtml(formatCruiseDate(cruise.arrivalDate)) + '</div>' +
            '<div class="itinerary-meta">' + escapeHtml(cruise.shipName) + '</div>' +
            '<p class="itinerary-summary">' + escapeHtml(itineraryNarrative) + '</p>' +
            '<div class="itinerary-footer">' +
              '<button class="itinerary-offers-link" type="button" data-offer-target="' + offerId + '" aria-expanded="false">' + offersButtonLabel + '</button>' +
              '<div class="itinerary-meta itinerary-route">Route: ' + escapeHtml(itineraryRoute) + '</div>' +
              '<div class="itinerary-footer-spacer" aria-hidden="true"></div>' +
            '</div>' +
            '<div class="itinerary-offer-details" id="' + offerId + '" hidden>' +
              offers.map(function(offer) {
                const statusClass = offer.status === "Eligible" ? " is-eligible" : " is-not-eligible";
                return '<div class="itinerary-offer-item"><div class="itinerary-offer-title">' + escapeHtml(offer.title) + '</div>' +
                  (offer.status ? '<div class="itinerary-offer-status' + statusClass + '">' + escapeHtml(offer.status) + '</div>' : '') +
                  '<div class="itinerary-meta">' + escapeHtml(offer.detail) + '</div></div>';
              }).join("") +
            '</div></li>';
        }).join("") + '</ul>';
    }

    function renderDestinationModalTab() {
      const tabsEl = document.getElementById("destinationTabs");
      const bodyEl = document.getElementById("destinationModalBody");
      const heroEl = document.getElementById("destinationModalHero");
      if (!currentDestinationDetail) {
        tabsEl.innerHTML = "";
        bodyEl.innerHTML = '<div class="destination-block"><div class="destination-rich"><p>No destination selected.</p></div></div>';
        heroEl.hidden = true;
        return;
      }

      const tabs = [
        { key: "overview", label: "Overview" },
        { key: "getting-there", label: "Getting There" },
        { key: "things-to-do", label: "Things To Do" },
        { key: "cruises", label: "Itineraries" }
      ];

      tabsEl.innerHTML = tabs.map(function(tab) {
        return '<button class="destination-tab' + (tab.key === currentDestinationTab ? ' is-active' : '') + '" type="button" data-destination-tab="' + tab.key + '">' + tab.label + '</button>';
      }).join("");

      heroEl.hidden = true;

      if (currentDestinationTab === "overview") {
        bodyEl.innerHTML = renderDestinationOverview(currentDestinationDetail.detail);
      } else if (currentDestinationTab === "getting-there") {
        bodyEl.innerHTML = renderDestinationGettingThere(currentDestinationDetail.detail);
      } else if (currentDestinationTab === "things-to-do") {
        bodyEl.innerHTML = renderDestinationThingsToDo(currentDestinationDetail.detail);
      } else {
        bodyEl.innerHTML = renderDestinationCruises(currentDestinationDetail);
      }
    }

    function openDestinationModal(destination) {
      currentDestinationDetail = destination;
      currentDestinationTab = "overview";
      document.getElementById("destinationModalTitle").textContent = destination.name;
      document.getElementById("destinationModalSubtitle").textContent = destination.country;
      document.getElementById("destinationModalHero").hidden = true;
      document.getElementById("destinationModalHeroImage").removeAttribute("src");
      document.getElementById("destinationModalHeroImage").alt = "";
      renderDestinationModalTab();
      document.getElementById("destinationModal").classList.add("is-open");
      document.getElementById("destinationModal").setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeDestinationModal() {
      document.getElementById("destinationModal").classList.remove("is-open");
      document.getElementById("destinationModal").setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function refreshDestinationModalIfOpen() {
      const modalEl = document.getElementById("destinationModal");
      if (!modalEl || !modalEl.classList.contains("is-open") || !currentDestinationDetail) {
        return;
      }

      renderDestinationModalTab();
    }

    function renderDestinationGallery(mergedPayload) {
      currentMergedPayload = mergedPayload;
      destinationMatchedCruiseIdsCache = new Map();
      const settingFilter = document.getElementById("destinationSettingFilter");
      const bestTimeFilter = document.getElementById("destinationBestTimeFilter");
      const statusEl = document.getElementById("destinationStatus");
      const gridEl = document.getElementById("destinationGrid");
      const modalEl = document.getElementById("destinationModal");
      const modalCloseEl = document.getElementById("destinationModalClose");
      const tabsEl = document.getElementById("destinationTabs");

      const countryEntries = Object.entries(mergedPayload)
        .filter(function(entry) { return entry[0].indexOf("__") !== 0; })
        .map(function(entry) { return entry[1]; });

      destinationGalleryData = countryEntries.flatMap(function(country) {
        return (country.destinations || []).map(function(destination) {
          return {
            key: normalizeDestinationKey(destination.name || "", country.label || ""),
            country: country.label || "",
            name: destination.name || "",
            imageUrl: destination.image_url || "",
            region: destination.region && destination.region.label ? destination.region.label : "",
            setting: destination.setting && destination.setting.label ? destination.setting.label : "",
            bestTime: destination.best_time_to_visit && destination.best_time_to_visit.label ? destination.best_time_to_visit.label : "",
            detail: destination.explore || null,
            cruiseIds: Array.isArray(destination.cruise_ids) ? destination.cruise_ids.slice() : [],
            countryCruiseIds: Array.isArray(country.cruise_ids) ? country.cruise_ids.slice() : []
          };
        });
      }).sort(function(a, b) {
        return a.name.localeCompare(b.name) || a.country.localeCompare(b.country);
      });

      fillDestinationSelect(
        settingFilter,
        orderValuesByPreferred(
          Array.from(new Set(destinationGalleryData.map(function(item) { return item.setting; }).filter(Boolean))),
          DESTINATION_SETTING_ORDER
        ),
        "Setting"
      );
      fillDestinationSelect(
        bestTimeFilter,
        orderValuesByPreferred(
          Array.from(new Set(destinationGalleryData.map(function(item) { return item.bestTime; }).filter(Boolean))),
          DESTINATION_BEST_TIME_ORDER
        ),
        "Best Time to Visit"
      );

      if (currentDestinationSettingFilter && Array.from(settingFilter.options).every(function(option) { return option.value !== currentDestinationSettingFilter; })) {
        currentDestinationSettingFilter = "";
      }
      if (currentDestinationBestTimeFilter && Array.from(bestTimeFilter.options).every(function(option) { return option.value !== currentDestinationBestTimeFilter; })) {
        currentDestinationBestTimeFilter = "";
      }

      settingFilter.value = currentDestinationSettingFilter;
      bestTimeFilter.value = currentDestinationBestTimeFilter;
      refreshDestinationCruiseIdSet();

      function renderGrid() {
        const filteredCruiseIdSet = getCurrentFilteredCruiseIdSet();
        const applyCruiseFiltersToDestinations = hasActiveCruiseFilters();
        const filtered = destinationGalleryData.filter(function(item) {
          if (currentDestinationSettingFilter && item.setting !== currentDestinationSettingFilter) {
            return false;
          }
          if (!applyCruiseFiltersToDestinations) {
            return true;
          }
          return getDestinationMatchedCruiseIds(item).some(function(cruiseId) {
            return filteredCruiseIdSet.has(String(cruiseId || ""));
          });
        });

        currentDestinationResultsCount = filtered.length;
        updateBrowserTabCounts();
        autoSwitchBrowserTabIfNeeded();
        statusEl.textContent = filtered.length + " destinations";
        gridEl.innerHTML = filtered.length ? filtered.map(function(item) {
          return '<article class="destination-card">' +
            '<div class="destination-card-image">' +
              (item.imageUrl ? '<img src="' + escapeHtml(item.imageUrl) + '" alt="' + escapeHtml(item.name + " " + item.country) + '" loading="lazy" decoding="async">' : '') +
              '<button class="destination-card-explore" type="button" data-destination-key="' + escapeHtml(item.key) + '">Explore</button>' +
            '</div>' +
            '<div class="destination-card-copy">' +
              '<span class="destination-card-name">' + escapeHtml(item.name) + '</span>' +
              '<span class="destination-card-country">' + escapeHtml(item.country) + '</span>' +
            '</div>' +
          '</article>';
        }).join("") : '<div class="destination-empty">No destinations match the current filters.</div>';
      }

      rerenderDestinationGrid = renderGrid;

      function handleSingleDestinationFilter(changedSelect) {
        runSearchFeedback(function() {
          currentDestinationSettingFilter = changedSelect === settingFilter ? (settingFilter.value || "") : "";
          currentDestinationBestTimeFilter = changedSelect === bestTimeFilter ? (bestTimeFilter.value || "") : "";
          settingFilter.value = currentDestinationSettingFilter;
          bestTimeFilter.value = currentDestinationBestTimeFilter;
          resetItineraryDateSelectionState();
          currentDeparturePortFilter = null;
          refreshDestinationCruiseIdSet();
          renderGrid();
          renderItineraryBrowser();
          refreshDestinationModalIfOpen();
        }, "Searching destinations...");
      }

      settingFilter.onchange = function() { handleSingleDestinationFilter(settingFilter); };
      bestTimeFilter.onchange = function() { handleSingleDestinationFilter(bestTimeFilter); };
      gridEl.onclick = function(event) {
        const button = event.target.closest("[data-destination-key]");
        const destination = button ? destinationGalleryData.find(function(item) { return item.key === button.getAttribute("data-destination-key"); }) : null;
        if (destination) {
          openDestinationModal(destination);
        }
      };
      modalCloseEl.onclick = closeDestinationModal;
      modalEl.onclick = function(event) {
        if (event.target === modalEl) {
          closeDestinationModal();
        }
      };
      document.getElementById("destinationModalBody").onclick = function(event) {
        const button = event.target.closest("[data-offer-target]");
        if (!button) {
          return;
        }
        const targetId = button.getAttribute("data-offer-target");
        const target = targetId ? document.getElementById(targetId) : null;
        if (!target) {
          return;
        }
        target.hidden = !target.hidden;
        button.setAttribute("aria-expanded", target.hidden ? "false" : "true");
      };
      tabsEl.onclick = function(event) {
        const button = event.target.closest("[data-destination-tab]");
        if (!button) {
          return;
        }
        currentDestinationTab = button.getAttribute("data-destination-tab");
        renderDestinationModalTab();
      };

      renderGrid();
    }

    function wireBrowserTabs() {
      const categorySelect = document.getElementById("browserCategorySelect");
      const itinerariesPane = document.getElementById("browserItinerariesPane");
      const destinationsPane = document.getElementById("browserDestinationsPane");

      if (!categorySelect || !itinerariesPane || !destinationsPane) {
        return;
      }

      categorySelect.addEventListener("change", function() {
        setBrowserTab(categorySelect.value || "destinations");
      });

      setBrowserTab(currentBrowserTab);
    }

    async function loadMap() {
      try {
        isBootstrappingBrowserView = true;
        currentBrowserTab = "destinations";
        setBrowserTab("destinations");
        const mergedResponse = await fetch("./destinations.json", { cache: "no-store" });

        if (!mergedResponse.ok) {
          throw new Error("Failed to load destinations.json");
        }

        const mergedPayload = await mergedResponse.json();
        const cruises = Object.values(mergedPayload.__cruises_index || {}).map(function(cruise) {
          return mapMergedCruiseToBrowserShape(cruise);
        });

        const payload = {
          generatedAt: mergedPayload.__cruises_metadata && mergedPayload.__cruises_metadata.cruises_generated_at
            ? mergedPayload.__cruises_metadata.cruises_generated_at
            : "",
          source: mergedPayload.__cruises_metadata && mergedPayload.__cruises_metadata.cruises_source
            ? mergedPayload.__cruises_metadata.cruises_source
            : "",
          totalItineraries: mergedPayload.__cruises_metadata && typeof mergedPayload.__cruises_metadata.total_cruise_itineraries === "number"
            ? mergedPayload.__cruises_metadata.total_cruise_itineraries
            : cruises.length,
          totalSailings: mergedPayload.__cruises_metadata && typeof mergedPayload.__cruises_metadata.total_cruise_sailings === "number"
            ? mergedPayload.__cruises_metadata.total_cruise_sailings
            : cruises.length,
          cruises: cruises
        };

        currentPayload = payload;
        renderWorldMap(payload);
        renderDestinationGallery(mergedPayload);
        currentBrowserTab = "destinations";
        setBrowserTab("destinations");
        updateRefreshStatusFromPayload(mergedPayload);
      } catch (error) {
        document.getElementById("heroCopy").textContent = error.message;
        document.getElementById("destinationStatus").textContent = error.message;
        setRefreshStatus(error.message, "error");
      } finally {
        isBootstrappingBrowserView = false;
      }
    }

    let resizeTimer = null;
    window.addEventListener("resize", function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        if (!currentPayload) {
          loadMap();
          return;
        }
        if (currentView === "country" && currentDrilldownCode) {
          renderCountryDrilldown(currentDrilldownCode, currentPayload);
          return;
        }
        renderWorldMap(currentPayload);
      }, 150);
    });

    currentPayload = { cruises: [] };
    renderWorldMap(currentPayload);
    loadMap();
    configureRefreshControls();
    bindMapViewControls();
    wireDropdownFilters();
    wireBrowserTabs();
    wireItineraryCountButtons();
    wireRefreshMergedButton();
  </script>
</body>
</html>
